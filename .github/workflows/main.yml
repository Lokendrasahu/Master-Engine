name: "Nexus SaaS: Client Engine"

on:
  workflow_dispatch:

permissions:
  actions: write
  contents: read

jobs:
  deploy-client-bot:
    name: "Deploy & Sync Services"
    runs-on: ubuntu-latest
    timeout-minutes: 360 
    
    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      # ==================================================================
      # [PHASE 1]: SYSTEM TUNING & AWS CLI
      # CONSTRAINT: Free runner has only 7GB RAM. 4GB Swap is strictly required.
      # ==================================================================
      - name: ⚙️ Provision Virtual Environment
        run: |
          sudo fallocate -l 4G /swapfile || true && sudo chmod 600 /swapfile || true && sudo mkswap /swapfile || true && sudo swapon /swapfile || true
          sudo sysctl -w net.core.default_qdisc=fq && sudo sysctl -w net.ipv4.tcp_congestion_control=bbr
          sudo apt-get update -qq && sudo apt-get install -y sqlite3 curl zip unzip jq awscli
          mkdir -p whatsapp public n8n_data/nodes n8n_data/node_modules

      # ==================================================================
      # [PHASE 2]: ZERO-DOWNTIME HANDOVER (Isolated per Client Repo)
      # CONSTRAINT: Cancels ONLY the previous runs of THIS specific client repo.
      # ==================================================================
      - name: 🤝 Execute Stateful Handover
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          echo "Scanning for previous deployments in this client repository..."
          OLD_RUN=$(gh run list --workflow="main.yml" --json databaseId,status -q '[.[] | select(.databaseId != '${{ github.run_id }}' and (.status == "in_progress" or .status == "queued" or .status == "waiting"))] | .[0]?.databaseId')
          
          if [ -n "$OLD_RUN" ] && [ "$OLD_RUN" != "null" ]; then
            echo "Previous instance ($OLD_RUN) detected. Sending termination signal..."
            gh run cancel $OLD_RUN
            sleep 15 # Wait for the old runner to upload its final state to R2
          fi

      # ==================================================================
      # [PHASE 3]: CLOUDFLARE R2 SYNC (Download State)
      # CONSTRAINT: Folder name is based on CLIENT_MOBILE for easy identification.
      # ==================================================================
      - name: ☁️ Download State from Cloudflare R2
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
          R2_ENDPOINT: https://${{ secrets.R2_ACCOUNT_ID }}.r2.cloudflarestorage.com
          BUCKET: ${{ secrets.R2_BUCKET_NAME }}
          CLIENT_MOBILE: ${{ secrets.CLIENT_MOBILE }}
        run: |
          echo "Pulling Client Data from R2 Storage: $CLIENT_MOBILE"
          
          # 1. Download n8n Database
          aws s3 cp s3://$BUCKET/$CLIENT_MOBILE/database.sqlite n8n_data/database.sqlite --endpoint-url $R2_ENDPOINT || echo "Fresh n8n deployment."
          
          # 2. Download WhatsApp Session (Local Auth ZIP)
          aws s3 cp s3://$BUCKET/$CLIENT_MOBILE/wa_auth.zip wa_auth.zip --endpoint-url $R2_ENDPOINT || echo "No existing WA session."
          if [ -f wa_auth.zip ]; then
            unzip wa_auth.zip -d whatsapp/ || true
            rm wa_auth.zip
          fi
          
          sudo chmod -R 777 n8n_data whatsapp

      # ==================================================================
      # [PHASE 4]: COMMUNITY EXTENSIONS
      # CONSTRAINT: Must use --legacy-peer-deps to prevent isolated-vm C++ 
      # build crash on GitHub's Node 20 environment.
      # ==================================================================
      - name: 🧩 Configure Community Extensions
        run: |
          cd n8n_data/nodes
          [ ! -f package.json ] && npm init -y
          echo "Installing n8n-nodes-unlimited-fallback-agent..."
          npm install n8n-nodes-unlimited-fallback-agent --legacy-peer-deps --no-fund --no-audit
          cd ../..
          sudo chmod -R 777 n8n_data

      # ==================================================================
      # [PHASE 5]: MICROSERVICES DEPLOYMENT (n8n Diet + Private WA APIs)
      # CONSTRAINT: DB runs on strict diet to keep SQLite size under 15-20MB.
      # ==================================================================
      - name: 🚀 Deploy Client Services
        env:
          CF_TOKEN: ${{ secrets.CF_TUNNEL_TOKEN }}
          CLIENT_MOBILE: ${{ secrets.CLIENT_MOBILE }}
        run: |
          docker network create prod-net || true
          
          docker run -d --name cloudflared --network host --restart unless-stopped \
            cloudflare/cloudflared:latest tunnel --no-autoupdate run --token $CF_TOKEN
          
          docker run -d --name n8n --network prod-net --restart unless-stopped \
            -v $(pwd)/n8n_data:/home/node/.n8n \
            -e N8N_ENCRYPTION_KEY="$CLIENT_MOBILE" \
            -e WEBHOOK_URL="https://nexusautomation.dpdns.org" \
            -e DB_SQLITE_VACUUM_ON_STARTUP=true \
            -e EXECUTIONS_DATA_PRUNE=true \
            -e EXECUTIONS_DATA_MAX_AGE=24 \
            -e EXECUTIONS_DATA_PRUNE_MAX_COUNT=50 \
            -e EXECUTIONS_DATA_SAVE_ON_SUCCESS=none \
            -e NODE_FUNCTION_ALLOW_BUILTIN=* \
            -e NODE_FUNCTION_ALLOW_EXTERNAL=* \
            n8nio/n8n

          cat << 'EOF' > whatsapp/index.js
          const { default: makeWASocket, DisconnectReason, useMultiFileAuthState, fetchLatestBaileysVersion } = require('@whiskeysockets/baileys');
          const express = require('express'); const axios = require('axios'); const QRCode = require('qrcode'); const pino = require('pino');
          const fs = require('fs');
          const app = express(); app.use(express.json());
          
          const PORT = 10000;
          const N8N_URL = "http://n8n:5678/webhook/whatsapp"; 
          let sock; let qrData = null;

          async function start() {
              const { state, saveCreds } = await useMultiFileAuthState('auth_info_baileys');
              const { version } = await fetchLatestBaileysVersion();
              
              sock = makeWASocket({ version, auth: state, logger: pino({ level: 'silent' }), browser: ["Nexus Client Bot", "Chrome", "20.0"] });
              sock.ev.on('creds.update', saveCreds);
              
              sock.ev.on('connection.update', (u) => { 
                  if(u.qr) qrData = u.qr; 
                  if(u.connection === 'open') { qrData = null; console.log("WA Connected!"); }
                  if(u.connection === 'close' && u.lastDisconnect?.error?.output?.statusCode !== DisconnectReason.loggedOut) setTimeout(start, 5000);
              });
              
              sock.ev.on('messages.upsert', async ({ messages }) => {
                  const msg = messages[0]; 
                  if(!msg.message || msg.key.fromMe) return;
                  await axios.post(N8N_URL, { full_json: msg }).catch(() => {});
              });
          }

          // Internal JSON APIs for n8n Webhooks (Private to Docker Network)
          app.get('/api/qr', async (req, res) => {
              if(sock?.user) return res.json({ status: "connected", phone: sock.user.id });
              if(!qrData) return res.json({ status: "generating" });
              res.json({ status: "qr_ready", qr_base64: await QRCode.toDataURL(qrData) });
          });

          app.post('/api/reset', async (req, res) => {
              if(sock) sock.logout();
              if(fs.existsSync('auth_info_baileys')) fs.rmSync('auth_info_baileys', { recursive: true, force: true });
              qrData = null;
              setTimeout(start, 2000);
              res.json({ status: "reset_initiated" });
          });

          app.post('/send', async (req, res) => {
              const { number, message } = req.body;
              if(!sock?.user) return res.status(503).json({ error: `Offline` });
              const jid = number.includes('@') ? number : `${number}@s.whatsapp.net`;
              await sock.sendMessage(jid, { text: message });
              res.json({ status: true });
          });

          app.get('/health', (req, res) => res.send("OK"));
          app.listen(PORT, start);
          EOF

          docker run --rm -v $(pwd)/whatsapp:/app -w /app node:20-alpine sh -c "npm install @whiskeysockets/baileys axios express qrcode pino"

          # Caddy Iron Wall: Blocks external internet from accessing WA /api directly
          printf ":80 {\n reverse_proxy /* n8n:5678\n}\n" > Caddyfile
          docker run -d --name caddy --network prod-net -p 80:80 -v $(pwd)/Caddyfile:/etc/caddy/Caddyfile caddy:latest
          
          docker run -d --name wa-bot --network prod-net --restart unless-stopped -v $(pwd)/whatsapp:/app -w /app node:20-alpine sh -c "node index.js"

      # ==================================================================
      # [PHASE 6]: STATE SYNC LOOP & AUTO-RESTART
      # CONSTRAINT: SQLite MUST be vacuumed before every upload to minimize size.
      # ==================================================================
      - name: 🔄 R2 Sync & Keep-Alive Loop
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
          CLIENT_MOBILE: ${{ secrets.CLIENT_MOBILE }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
          R2_ENDPOINT: https://${{ secrets.R2_ACCOUNT_ID }}.r2.cloudflarestorage.com
          BUCKET: ${{ secrets.R2_BUCKET_NAME }}
        run: |
          
          upload_state() {
              echo "Backing up state to R2 ($CLIENT_MOBILE)..."
              # 1. Vacuum and Upload SQLite (Keeps file size tiny)
              sqlite3 n8n_data/database.sqlite 'VACUUM;' || true
              aws s3 cp n8n_data/database.sqlite s3://$BUCKET/$CLIENT_MOBILE/database.sqlite --endpoint-url $R2_ENDPOINT >/dev/null 2>&1
              
              # 2. Zip and Upload WA Session
              if [ -d "whatsapp/auth_info_baileys" ]; then
                cd whatsapp && zip -r ../wa_auth.zip auth_info_baileys/ >/dev/null 2>&1 && cd ..
                aws s3 cp wa_auth.zip s3://$BUCKET/$CLIENT_MOBILE/wa_auth.zip --endpoint-url $R2_ENDPOINT >/dev/null 2>&1
              fi
          }

          cleanup() {
              [ -f /tmp/sync_lock ] && exit 0; touch /tmp/sync_lock
              echo "🛑 Pre-emption Signal Caught. Uploading final state..."
              docker stop -t 3 n8n || true
              upload_state
              exit 0
          }
          
          trap 'cleanup' SIGINT SIGTERM SIGHUP
          
          START=$(date +%s)
          
          while true; do
              NOW=$(date +%s); DIFF=$((NOW - START))
              
              # Enforce rolling update at 5h 50m (21000 seconds)
              if [ $DIFF -ge 21000 ]; then
                  echo "TTL Threshold Reached. Triggering Next Runner..."
                  gh workflow run main.yml
                  for i in {1..12}; do sleep 5; done 
                  exit 0
              fi
              
              # Routine State Backup (Every 15 mins)
              if [ $((DIFF % 900)) -lt 60 ] && [ $DIFF -gt 100 ]; then
                  upload_state
              fi
              
              for k in {1..12}; do sleep 5; done
          done
